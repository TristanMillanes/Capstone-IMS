<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Records</title>
  <link rel="stylesheet" href="employee.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>Employee Record Management</h1>
      <p>Manage employee information easily</p>
    </header>

    <section class="form-card">
      <h2>Add Employee</h2>

      <form id="employeeForm">
        <input type="hidden" id="editIndex">

        <div class="Top-actions">
            <button type="button" id="addEmployeeBtn">Add Employee</button>
        </div>

        <div class="form-grid">
          <input type="text" id="employeeId" placeholder="Employee ID" required>
          <input type="text" id="fullName" placeholder="Full Name" required>
          <input type="text" id="position" placeholder="Position" required>
          <input type="text" id="department" placeholder="Department" required>
          <input type="email" id="email" placeholder="Email Address" required>
          <input type="text" id="contact" placeholder="Contact Number" required>
          <input type="date" id="dateHired" required>
          <select id="status" required>
            <option value="">Select Status</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="On Leave">On Leave</option>
          </select>
        </div>

        <button type="submit" id="submitBtn">Save Employee</button>
      </form>
    </section>

    <section class="table-card">
      <div class="table-header">
        <h2>Employee List</h2>
        <input type="text" id="searchInput" placeholder="Search employee...">
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Position</th>
              <th>Department</th>
              <th>Email</th>
              <th>Contact</th>
              <th>Date Hired</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="employeeTable"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="employee.js"></script>
</body>
</html>
